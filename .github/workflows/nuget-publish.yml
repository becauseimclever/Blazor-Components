name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BecauseImClever.Components.sln

      - name: Build
        run: dotnet build BecauseImClever.Components.sln --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test BecauseImClever.Components.sln \
            --configuration Release \
            --no-build

      - name: Pack
        run: dotnet pack src/BecauseImClever.Components/BecauseImClever.Components.csproj --configuration Release --no-build --output ./artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/becauseimclever/index.json --skip-duplicate
