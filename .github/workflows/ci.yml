name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore BecauseImClever.Components.sln

      - name: Build solution
        run: dotnet build BecauseImClever.Components.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test BecauseImClever.Components.sln \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --logger "trx" \
            --results-directory ./TestResults

      - name: Merge coverage reports
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: always()
        with:
          reports: ./TestResults/**/coverage.cobertura.xml
          targetdir: ./CoverageReport
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary
        if: always()
        run: cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: ./CoverageReport/Cobertura.xml
          fail_below_min: true
          thresholds: '60 80'
          format: markdown
          output: both

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ./CoverageReport/Cobertura.xml
          retention-days: 30

      - name: Test Summary
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: ./TestResults/*.trx
          reporter: dotnet-trx

  pack:
    name: Pack NuGet (Validation)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/BecauseImClever.Components/BecauseImClever.Components.csproj --configuration Release --output ./artifacts

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package-preview
          path: ./artifacts/*.nupkg
          retention-days: 7
